<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診断結果</title>

    <link rel="stylesheet" href="css/result_style.css">

</head>
<body>
    <div>
        <h1>診断結果</h1>
        <div class="score-box">
            <h3>あなたのスコアは・・・</h3>
            <div class="score-flex">
                <p>
                    <span>ヴェータ </span><span id="js-vata">0</span><span>ポイント</span>
                </p>
                <p>
                    <span>ピッタ </span><span id="js-pitta">0</span><span>ポイント</span>
                </p>
                <p>
                    <span>カファ </span><span id="js-kapha">0</span><span>ポイント</span>
                </p>
            </div>
        </div>

        <div class="type-about">
            <h3>ドーシャ別の特徴とワンポイントアドバイス</h3>
            <p>
                チェック表で一番数が多かったものが今のあなたの優勢なドーシャです。もし2つ、3つが同じくらいの数になった場合は、あなたの特徴に一番当てはまると思うものを参考にしてみてください。また、ドーシャバランスは季節や年齢によっても変化することがあるので、定期的なチェックがおすすめです。
            </p>
        </div>
        <div class="type-box">
            <div>
                <h3>あなたのタイプは...</h3>
                <h4 id="js-result">タイプ</h4>
            </div>
            <div id="js-resultDetail" class="type-detail">詳細</div>
            <div>
                <h4 id="js-result-2"></h4>
            </div>
            <div id="js-resultDetail-2" class="type-detail"></div>
        </div>
    </div>

    <footer>
        <a href="https://www.tokyo-yogawear.jp/dosha.html">https://www.tokyo-yogawear.jp/dosha.html</a>
    </footer>


    <script src="js\result_app.js"></script>
    <script src="js\app.js"></script>
    <!-- <script src="js/result_app.js"></script> -->
    
</body>
</html>
